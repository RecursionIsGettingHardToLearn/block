services:
  postgres:
    image: postgres:16-alpine
    container_name: block-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD}
      POSTGRES_DB: evoting
    volumes:
      - block-pgdata:/var/lib/postgresql/data
      # Se ejecuta solo la primera vez, cuando el volumen está vacío.
      - ../database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      # Solo accesible desde la propia máquina: la base nunca se expone a
      # internet. El backend corre en el mismo anfitrión.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  block-pgdata:
